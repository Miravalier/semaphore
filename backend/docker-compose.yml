networks:
    semaphore:
        external: false
services:
    api:
        container_name: semaphore_api
        networks:
            - semaphore
        build: .
        restart: unless-stopped
        ports:
            - "${HTTP_PORT}:80"
        environment:
            - "TURN_SERVER=${TURN_SERVER}"
            - "TURN_USERNAME=${TURN_USERNAME}"
            - "TURN_PASSWORD=${TURN_PASSWORD}"
